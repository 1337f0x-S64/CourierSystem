services:
  db:
    image: postgres:16
    container_name: courier_db
    environment:
      POSTGRES_DB: courier_db
      POSTGRES_USER: courier_admin
      POSTGRES_PASSWORD: your_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courier_admin -d courier_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: courier_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/courier_db
      DB_USER: courier_admin
      DB_PASSWORD: your_secure_password
    ports:
      - "8080:8080"

volumes:
  postgres_data: